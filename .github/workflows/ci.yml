name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
        name: Type check

      - run: pnpm test
        name: Tests

      - run: pnpm build
        name: Build

      - name: Verify changeset
        if: "!contains(github.event.pull_request.title, '[skip changeset]') && !startsWith(github.event.pull_request.head.ref, 'changeset-release/') && github.event.pull_request.title != 'chore: version packages'"
        run: pnpm changeset status --since=origin/main
